<script id="auth_guard">
const token = localStorage.getItem("token")

if(!token){
    window.location.href="/login"
}
</script>
{% extends "layout.html" %}

{% block content %}

<h3 class="mb-4">Dashboard</h3>

<div class="row">

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h6>Total Stock</h6>
<h3 id="totalStock">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h6>Low Stock</h6>
<h3 id="lowStock">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h6>Receipts</h6>
<h3 id="receipts">0</h3>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h6>Deliveries</h6>
<h3 id="deliveries">0</h3>
</div>
</div>
</div>

</div>

<script>

async function loadDashboard(){

const response = await fetch("/api/v1/dashboard")
const data = await response.json()

document.getElementById("totalStock").innerText = data.total_stock
document.getElementById("lowStock").innerText = data.low_stock_products
document.getElementById("receipts").innerText = data.receipts
document.getElementById("deliveries").innerText = data.deliveries

}

loadDashboard()

</script>

{% endblock %}

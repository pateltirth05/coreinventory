<!DOCTYPE html>
<html>
<head>

<title>Inventory System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<style>

body{
background:#f4f6f9;
font-family:system-ui;
}
i{
   padding-right: 10px;
}
.sidebar{
height:100vh;
width:240px;
position:fixed;
background:#111827;
color:white;
}

.sidebar h4{
font-weight:600;
}

.sidebar a{
display:block;
padding:14px 18px;
color:#d1d5db;
text-decoration:none;
font-size:15px;
}

.sidebar a:hover{
background:#1f2937;
color:white;
}

.navbar{
margin-left:240px;
background:white;
border-bottom:1px solid #e5e7eb;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

</style>

</head>

<body>

<div class="sidebar">

<h4 class="text-center py-3">Inventory</h4>
<a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="/products"><i class="bi bi-box"></i> Products</a>
<a href="/operations"><i class="bi bi-arrow-left-right"></i> Operations</a>
<a href="/warehouses"><i class="bi bi-building"></i> Warehouses</a>
<a href="/profile"><i class="bi bi-person"></i> Profile</a>
<button onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
</div>

<nav class="navbar navbar-light bg-light shadow-sm">
<div class="container-fluid">
<span class="navbar-brand">Inventory Management System</span>
</div>
</nav>

<div class="content">

{% block content %}{% endblock %}

</div>
<script id="logout_script">
function logout(){
    localStorage.removeItem("token")
    window.location.href="/login"
}
</script>
</body>
</html>
